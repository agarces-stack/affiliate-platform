# MagnetRaffic - Nginx Reverse Proxy with SSL
# Copy to /etc/nginx/sites-available/magnetraffic and symlink to sites-enabled
#
# Prerequisites:
#   1. Point your domain DNS A record to 72.60.124.152
#   2. Install certbot: apt install certbot python3-certbot-nginx
#   3. Copy this file: cp nginx.conf /etc/nginx/sites-available/magnetraffic
#   4. Symlink: ln -s /etc/nginx/sites-available/magnetraffic /etc/nginx/sites-enabled/
#   5. Get SSL cert: certbot --nginx -d yourdomain.com
#   6. Restart: systemctl restart nginx

server {
    listen 80;
    server_name yourdomain.com;  # CHANGE THIS to your domain

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com;  # CHANGE THIS to your domain

    # SSL certs (certbot will fill these in)
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to Node.js app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
    }

    # Rate limit tracking endpoints (extra layer on top of Express rate limiter)
    location /track {
        limit_req zone=tracking burst=50 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /postback {
        limit_req zone=tracking burst=50 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Rate limit zone (in http block, add to /etc/nginx/nginx.conf)
# limit_req_zone $binary_remote_addr zone=tracking:10m rate=30r/s;
