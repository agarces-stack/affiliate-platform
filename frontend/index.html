<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagnetRaffic - Affiliate Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; max-width: 500px; padding: 40px; }
        h1 { font-size: 3em; margin-bottom: 10px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 1.1em; }
        .buttons { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        a { display: inline-block; padding: 14px 32px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 1em; transition: all 0.2s; }
        .btn-admin { background: #3b82f6; color: white; }
        .btn-admin:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-affiliate { background: #8b5cf6; color: white; }
        .btn-affiliate:hover { background: #7c3aed; transform: translateY(-2px); }
        .stats { margin-top: 40px; display: flex; gap: 20px; justify-content: center; }
        .stat { background: #1e293b; padding: 20px; border-radius: 12px; min-width: 100px; }
        .stat-num { font-size: 1.8em; font-weight: 700; color: #3b82f6; }
        .stat-label { font-size: 0.8em; color: #64748b; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MagnetRaffic</h1>
        <p>Affiliate Tracking Platform</p>
        <div class="buttons">
            <a href="/admin" class="btn-admin">Admin Dashboard</a>
            <a href="/affiliate" class="btn-affiliate">Affiliate Portal</a>
        </div>
        <div class="stats" id="stats"></div>
    </div>
</body>
</html>
